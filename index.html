<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Rótulos | Cine Colombia</title>

    <!-- Fuentes Modernas (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Sin dependencias externas: usamos window.print() nativo para PDF perfecto -->

    <style>
        /* ==========================================================================
           VARIABLES DE DISEÑO (Estilo Vercel/Linear Minimalista)
           ========================================================================== */
        :root {
            /* Paleta base */
            --bg-app: #f8fafc;
            --bg-sidebar: #ffffff;
            --bg-preview: #e2e8f0;
            --sheet-scale: 1;

            /* Textos */
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;

            /* Bordes y acentos */
            --border-light: #e2e8f0;
            --border-input: #cbd5e1;
            --border-focus: #0284c7;
            /* Azul Cine Colombia suavizado */
            --ring-focus: rgba(2, 132, 199, 0.15);

            /* Botones */
            --btn-bg: #0284c7;
            --btn-hover: #0369a1;
            --btn-text: #ffffff;
        }

        /* ==========================================================================
           RESET Y ESTILOS GLOBALES
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-app);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ==========================================================================
           LAYOUT PRINCIPAL (Split Screen)
           ========================================================================== */
        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* BARRA LATERAL (Formulario) */
        .sidebar {
            width: 420px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            box-shadow: 1px 0 10px rgba(0, 0, 0, 0.03);
            z-index: 10;
        }

        .sidebar-header {
            padding: 32px 28px 24px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-header h1 {
            font-size: 1.125rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
        }

        .sidebar-header p {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .form-container {
            padding: 28px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-footer {
            padding: 24px 28px;
            border-top: 1px solid var(--border-light);
            background-color: var(--bg-sidebar);
        }

        /* ÁREA DE VISTA PREVIA */
        .preview-pane {
            flex: 1;
            background-color: var(--bg-preview);
            /* Patrón de puntos sutil para fondo de vista previa */
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
            overflow-y: auto;
        }

        /* ==========================================================================
           CONTROLES DE FORMULARIO
           ========================================================================== */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        input,
        select {
            width: 100%;
            padding: 10px 12px;
            background-color: #ffffff;
            border: 1px solid var(--border-input);
            border-radius: 6px;
            font-size: 0.875rem;
            color: var(--text-primary);
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
            outline: none;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:hover,
        select:hover {
            border-color: #94a3b8;
        }

        input:focus,
        select:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px var(--ring-focus);
        }

        /* Botón de Acción Principal */
        .btn {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .btn:hover:not(:disabled) {
            background-color: var(--btn-hover);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            transform: translateY(-1px);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Spinner de carga */
        .spinner {
            animation: rotate 2s linear infinite;
            width: 16px;
            height: 16px;
        }

        .spinner .path {
            stroke: currentColor;
            stroke-linecap: round;
            animation: dash 1.5s ease-in-out infinite;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes dash {
            0% {
                stroke-dasharray: 1, 150;
                stroke-dashoffset: 0;
            }

            50% {
                stroke-dasharray: 90, 150;
                stroke-dashoffset: -35;
            }

            100% {
                stroke-dasharray: 90, 150;
                stroke-dashoffset: -124;
            }
        }

        /* Scrollbar personalizado webkit */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* ==========================================================================
           ÁREA DE IMPRESIÓN (La Hoja A4 y Rótulos)
           ========================================================================== */

        /* Contenedor que simula la hoja A4 */
        .a4-wrapper {
            width: 210mm;
            height: 297mm;
            aspect-ratio: 210 / 297;
            background-color: #ffffff;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            flex-shrink: 0;
            /* Previene compresión flexbox */
            overflow: hidden;
            position: relative;
        }

        /* Cuadrícula de 3 columnas x 6 filas */
        .print-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(6, 1fr);
            width: 100%;
            height: 100%;
        }

        /* 
           Cada rótulo individual. 
           Usa padding milimétrico para no pegarse exactamente al borde de corte.
        */
        .label-card {
            padding: 2.5mm;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            background-color: #ffffff;
            overflow: hidden;
            /* Se añade un borde punteado ultra sutil para simular líneas de corte */
            border-right: 0.5px dashed #e2e8f0;
            border-bottom: 0.5px dashed #e2e8f0;
        }

        /* Eliminar bordes de corte punteados en los bordes extremos */
        .label-card:nth-child(3n) {
            border-right: none;
        }

        .label-card:nth-last-child(-n+3) {
            border-bottom: none;
        }

        /* Contenedor principal de los datos (El borde negro) */
        .label-inner {
            border: 1.2px solid #000000;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* --- Encabezado del Rótulo --- */
        .label-header {
            display: flex;
            border-bottom: 1.2px solid #000000;
            height: 12mm;
        }

        .lh-main {
            flex: 1;
            display: flex;
            align-items: center;
            position: relative;
        }

        .lh-logo {
            position: absolute;
            left: 2mm;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lh-title {
            flex: 1;
            text-align: center;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 6.5px;
            font-weight: 600;
            line-height: 1.2;
            color: #000000;
            padding-left: 18mm;
        }

        .lh-codes-wrapper {
            width: 26%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
        }

        .lh-codes {
            border-left: 1.2px solid #000000;
            border-bottom: 1.2px solid #000000;
            display: flex;
            height: 70%;
        }

        .lh-code-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 5.2px;
            font-weight: 600;
            color: #000000;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            line-height: 1.2;
        }

        .lh-code-col:first-child {
            border-right: 1.2px solid #000000;
            flex: 1.3;
        }

        /* --- Cuerpo del Rótulo --- */
        .label-body {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .body-row {
            flex: 1;
            border-bottom: 1px solid #000000;
            display: flex;
            align-items: stretch;
        }

        .body-row:last-child {
            border-bottom: none;
        }

        .row-text {
            display: flex;
            align-items: center;
            padding: 0 3px;
            width: 100%;
            min-width: 0;
        }

        .row-label {
            font-size: 5.5px;
            color: #000000;
            margin-right: 4px;
            font-family: Arial, Helvetica, sans-serif;
            white-space: nowrap;
        }

        .row-value {
            font-size: 6px;
            font-weight: 700;
            color: #000000;
            text-transform: uppercase;
            font-family: Arial, Helvetica, sans-serif;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: clip;
            /* Clip evita puntos suspensivos para aprovechar espacio total */
            flex: 1;
            min-width: 0;
            line-height: 1;
        }

        /* --- Pie de página del Rótulo --- */
        .label-footer {
            height: 3.5mm;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-size: 4px;
            font-style: italic;
            color: #000000;
            padding-bottom: 0.5mm;
            font-family: Arial, Helvetica, sans-serif;
            letter-spacing: -0.1px;
        }

        @page {
            size: A4 portrait;
            margin: 0;
        }

        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }

            html,
            body {
                width: 210mm;
                height: 297mm;
                margin: 0;
                padding: 0;
                overflow: hidden;
                background: #ffffff;
            }

            /* Ocultar todo excepto el área de impresión */
            body > * {
                display: none !important;
            }

            body > #print-root {
                display: block !important;
            }

            #print-root {
                position: absolute;
                top: 0;
                left: 0;
                width: 210mm;
                height: 297mm;
                background: #ffffff;
                overflow: hidden !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            #print-root .print-grid{
                width:210mm !important;
                height:297mm !important;
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            #print-root .a4-wrapper {
                width: 210mm !important;
                min-width: 210mm !important;
                max-width: 210mm !important;
                height: 297mm !important;
                min-height: 297mm !important;
                max-height: 297mm !important;
                box-shadow: none !important;
                transform: none !important;
                aspect-ratio: auto !important;
                overflow: hidden !important;
                page-break-after: avoid !important;
                page-break-before: avoid !important;
            }

            #print-root,
            #print-root * {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
            }

            .label-card {
                height: calc(297mm / 6) !important;
            }

            /* Ocultar bordes de guia de corte al imprimir */
            #print-root .label-card {
                border-right: none !important;
                border-bottom: none !important;
            }
        }

        /* ==========================================================================
           RESPONSIVIDAD (MOBILE)
           ========================================================================== */
        @media (max-width: 768px) {
            body {
                height: auto;
                min-height: 100dvh;
                overflow: auto;
            }

            .app-container {
                flex-direction: column;
                height: auto;
                overflow: visible;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-light);
                box-shadow: none;
            }

            .sidebar-header,
            .sidebar-footer {
                padding-left: 20px;
                padding-right: 20px;
            }

            .form-container {
                padding: 20px;
                gap: 16px;
            }

            .form-row {
                flex-direction: column;
                gap: 16px;
            }

            .preview-pane {
                padding: 16px;
                overflow: auto;
                justify-content: center;
            }

            .a4-wrapper {
                width: min(100%, 210mm);
                height: auto;
                aspect-ratio: 210 / 297;
            }

            /* La hoja a4 conserva su tamaño de impresión, el usuario puede hacer scroll para ver */
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- BARRA LATERAL (FORMULARIO) -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <h1>Rótulos de Reempaque</h1>
                <p>Complete los datos para generar y previsualizar la hoja de impresión.</p>
            </header>

            <div class="form-container">
                <form id="data-form" autocomplete="off">

                    <div class="form-group">
                        <label for="producto">Nombre del Producto</label>
                        <input type="text" id="producto" placeholder="Ej. Salchicha" required>
                    </div>

                    <div class="form-group">
                        <label for="fabricante">Fabricante</label>
                        <input type="text" id="fabricante" placeholder="Ej. Zenu" required>
                    </div>

                    <div class="form-group">
                        <label for="fecha-apertura">Fecha de Apertura</label>
                        <input type="date" id="fecha-apertura" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="venc-comercial">Vencimiento Comercial</label>
                            <input type="date" id="venc-comercial" required>
                        </div>
                        <div class="form-group">
                            <label for="venc-operativa">Vencimiento Operativa</label>
                            <input type="date" id="venc-operativa" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group" style="flex: 0.4;">
                            <label for="tipo-reg">Tipo Reg.</label>
                            <select id="tipo-reg">
                                <option value="RSA">RSA</option>
                                <option value="NSA">NSA</option>
                                <option value="PSA">PSA</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label for="num-reg">Número de Registro</label>
                            <input type="text" id="num-reg" placeholder="Ej. 123456" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="lote">Número de Lote</label>
                            <input type="text" id="lote" placeholder="Ej. 0987" required>
                        </div>
                        <div class="form-group">
                            <label for="responsable">Responsable</label>
                            <input type="text" id="responsable" placeholder="Ej. Juan Pérez" required>
                        </div>
                    </div>

                </form>
            </div>

            <footer class="sidebar-footer">
                <button type="button" class="btn" id="btn-exportar" onclick="generatePDF()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span>Generar PDF de Impresión</span>
                </button>
            </footer>
        </aside>

        <!-- VISTA PREVIA (RESULTADO PDF) -->
        <main class="preview-pane">
            <div class="a4-wrapper" id="print-area">
                <div class="print-grid" id="labels-container">
                    <!-- Los 18 rótulos se inyectarán aquí mediante JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Contenedor de impresión: visible solo al imprimir/exportar PDF -->
    <div id="print-root" style="display:none;">
        <div class="a4-wrapper" id="print-area-clone">
            <div class="print-grid" id="labels-container-clone"></div>
        </div>
    </div>

        // LÓGICA DE APLICACIÓN E INYECCIÓN DE DATOS
        // ==========================================================================

            initLabelsGrid();
            attachEventListeners();
        });

        // 2. Conecta eventos de actualización a los inputs del formulario
        function attachEventListeners() {
            const inputs = document.querySelectorAll('#data-form input, #data-form select');
            inputs.forEach(input => {
                input.addEventListener('input', updateAllLabels);
                input.addEventListener('change', updateAllLabels);
            });
            // Llamada inicial para vaciar los campos limpios
            updateAllLabels();
        }

        // 3. Formateadores de fecha para mantener legibilidad y estandarización
        function formatDateTime(val) {
            if (!val) return '';
            const [datePart, timePart] = val.split('T');
            if (!datePart || !timePart) return val;

            const [year, month, day] = datePart.split('-');
            let [hours, minutes] = timePart.split(':');
            hours = parseInt(hours, 10);

            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // Formato 12 hrs

            return `${day}/${month}/${year} - ${hours}:${minutes} ${ampm}`;
        }

        function formatDate(val) {
            if (!val) return '';
            const parts = val.split('-');
            if (parts.length !== 3) return val;
            return `${parts[2]}/${parts[1]}/${parts[0]}`;
        }

        // 4. Actualiza los 18 rótulos simultáneamente iterando el DOM
        function updateAllLabels() {
            // Lectura de datos
            const data = {
                producto: document.getElementById('producto').value,
                fabricante: document.getElementById('fabricante').value,
                fechaApertura: formatDate(document.getElementById('fecha-apertura').value),
                vencComercial: formatDate(document.getElementById('venc-comercial').value),
                vencOperativa: formatDate(document.getElementById('venc-operativa').value),
                tipoReg: document.getElementById('tipo-reg').value,
                numReg: document.getElementById('num-reg').value,
                lote: document.getElementById('lote').value,
                responsable: document.getElementById('responsable').value,
            };

            const stringRegistro = data.numReg ? `${data.tipoReg}: ${data.numReg}` : '';

            // Inyección rápida de datos
            const labels = document.querySelectorAll('.label-card');
            labels.forEach(label => {
                label.querySelector('.val-producto').textContent = data.producto;
                label.querySelector('.val-fabricante').textContent = data.fabricante;
                label.querySelector('.val-apertura').textContent = data.fechaApertura;
                label.querySelector('.val-comercial').textContent = data.vencComercial;
                label.querySelector('.val-operativa').textContent = data.vencOperativa;
                label.querySelector('.val-reg').textContent = stringRegistro;
                label.querySelector('.val-lote').textContent = data.lote;
                label.querySelector('.val-responsable').textContent = data.responsable;
            });
        }

        // ==========================================================================
        // EXPORTACIÓN A PDF - USA window.print() NATIVO (100% fiel a CSS mm)
        // ==========================================================================
        function generatePDF() {
            // 1. Copiar el contenido actual de los rótulos al clon de impresión
            const sourceGrid = document.getElementById('labels-container');
            const cloneGrid  = document.getElementById('labels-container-clone');
            cloneGrid.innerHTML = sourceGrid.innerHTML;

            // 2. Mostrar el div de impresión (el CSS de @media print lo maneja)
            const printRoot = document.getElementById('print-root');
            printRoot.style.display = 'block';

            // 3. Pequeño delay para que el browser pinte el clon antes de imprimir
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    window.print();
                });

                // 4. Ocultar el clon nuevamente al cerrar el diálogo de impresión
                //    (afterprint es el evento correcto, pero como fallback usamos otro timeout)
                const cleanup = () => {
                    printRoot.style.display = 'none';
                    window.removeEventListener('afterprint', cleanup);
                };
                window.addEventListener('afterprint', cleanup);

                // Fallback por si afterprint no dispara
                setTimeout(cleanup, 2000);
            }, 100);
        }
    </script>
